<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BingeBuy Premium Categories</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #ff6b6b;
    --secondary: #4ecdc4;
    --accent: #ffd166;
    --dark: #0f172a;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND BLOBS */
.blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--primary), transparent);
    filter: blur(120px);
    animation: float 10s infinite alternate ease-in-out;
}

.blob:nth-child(2){
    background: radial-gradient(circle, var(--secondary), transparent);
    right: 0;
    animation-delay: 2s;
}

@keyframes float {
    to { transform: translateY(80px) translateX(50px); }
}

/* HEADER */
header {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    font-size: 1.8rem;
    font-weight: 800;
}

/* SEARCH */
.search-bar {
    display: flex;
    border-radius: 30px;
    overflow: hidden;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.search-bar input {
    padding: 0.6rem 1rem;
    border: none;
    outline: none;
    background: transparent;
    color: white;
}

.search-bar button {
    background: var(--primary);
    border: none;
    padding: 0 1rem;
    color: white;
    cursor: pointer;
}

/* FILTERS */
.filters {
    text-align: center;
    margin: 2rem 0;
}

.filters button {
    margin: 0.4rem;
    padding: 0.6rem 1.5rem;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.3s;
}

.filters button:hover,
.filters button.active {
    background: var(--primary);
}

/* GRID */
.categories {
    max-width: 1200px;
    margin: auto;
    padding: 2rem;
}

.category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
}

/* CARD */
.category-card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    transform-style: preserve-3d;
    transition: 0.4s;
    cursor: pointer;
}

/* GLASS EFFECT */
.category-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    z-index: 1;
}

/* IMAGE */
.category-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    transition: transform 0.6s ease;
}

/* HOVER */
.category-card:hover img {
    transform: scale(1.2);
}

.category-card:hover {
    transform: translateY(-15px) rotateX(5deg) rotateY(-5deg);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1.5rem;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    z-index: 2;
}

.overlay h2 {
    font-size: 1.8rem;
}

/* BUTTON */
.overlay button {
    margin-top: 1rem;
    padding: 0.6rem;
    border-radius: 20px;
    border: none;
    background: var(--accent);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* RIPPLE EFFECT */
.overlay button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: 0.5s;
}

.overlay button:active::after {
    width: 200px;
    height: 200px;
}

/* BADGE */
.badge {
    position: absolute;
    top: 15px;
    left: 15px;
    background: var(--primary);
    padding: 5px 10px;
    border-radius: 20px;
    z-index: 3;
}

/* SCROLL ANIMATION */
.category-card {
    opacity: 0;
    transform: translateY(60px);
    transition: 0.6s ease;
}

.category-card.show {
    opacity: 1;
    transform: translateY(0);
}

/* RESPONSIVE */
@media(max-width:768px){
    header {
        flex-direction: column;
        gap: 1rem;
    }
}
</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<header>
    <h1>BingeBuy</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search categories...">
        <button><i class="fas fa-search"></i></button>
    </div>
</header>

<div class="filters">
    <button class="active" onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('shoes')">Shoes</button>
    <button onclick="filterCategory('clothing')">Clothing</button>
    <button onclick="filterCategory('appliances')">Appliances</button>
    <button onclick="filterCategory('consoles')">Consoles</button>
</div>

<section class="categories">
<div class="category-grid" id="grid">

<!-- CARDS -->
<div class="category-card" data-category="shoes">
    <span class="badge">Hot</span>
    <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a">
    <div class="overlay">
        <h2>Shoes</h2>
        <button onclick="openCategory('Shoes')">Explore</button>
    </div>
</div>

<div class="category-card" data-category="clothing">
    <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47">
    <div class="overlay">
        <h2>Clothing</h2>
        <button onclick="openCategory('Clothing')">Explore</button>
    </div>
</div>

<div class="category-card" data-category="appliances">
    <span class="badge">New</span>
    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
    <div class="overlay">
        <h2>Appliances</h2>
        <button onclick="openCategory('Appliances')">Explore</button>
    </div>
</div>

<div class="category-card" data-category="consoles">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <div class="overlay">
        <h2>Gaming</h2>
        <button onclick="openCategory('Gaming')">Explore</button>
    </div>
</div>

</div>
</section>

<script>

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
});

document.querySelectorAll('.category-card').forEach(card=>{
    observer.observe(card);
});

/* FILTER */
function filterCategory(cat){
    document.querySelectorAll('.category-card').forEach(card=>{
        card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block':'none';
    });
}

/* SEARCH */
document.getElementById('searchInput').addEventListener('keyup', function(){
    let val = this.value.toLowerCase();
    document.querySelectorAll('.category-card').forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(val) ? 'block':'none';
    });
});

/* PARALLAX TILT */
document.querySelectorAll('.category-card').forEach(card=>{
    card.addEventListener('mousemove', e=>{
        let x = e.offsetX / card.clientWidth - 0.5;
        let y = e.offsetY / card.clientHeight - 0.5;
        card.style.transform = `rotateY(${x*10}deg) rotateX(${y*-10}deg)`;
    });

    card.addEventListener('mouseleave', ()=>{
        card.style.transform = "";
    });
});

/* BUTTON ACTION */
function openCategory(name){
    alert(name + " opened 🚀");
}

</script>

</body>
</html>
